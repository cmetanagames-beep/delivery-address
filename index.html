<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
* { box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f5f5f5; color: #333; }
header { background: linear-gradient(135deg, #ED1C24, #b8151b); padding: 20px 30px; display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
header img { height: 60px; background: white; padding: 6px 12px; border-radius: 8px; }
header h1 { color: white; font-size: 24px; margin: 0; font-weight: 600; }
header p { color: #ffe5e5; margin: 0; font-size: 14px; }
.search-panel { max-width: 1200px; margin: 20px auto 0; padding: 0 20px; position: relative; }
.search-box { background: white; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 20px; display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
.search-field { flex: 1; min-width: 250px; position: relative; }
.search-field label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; font-weight: 600; }
.search-field input { width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px; outline: none; transition: border-color 0.2s; }
.search-field input:focus { border-color: #ED1C24; }
#searchBtn { background: #ED1C24; color: white; border: none; padding: 13px 28px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
#searchBtn:disabled { background: #ccc; cursor: not-allowed; }
#searchBtn:hover:not(:disabled) { background: #c8151c; }
#searchStatus { width: 100%; font-size: 13px; margin-top: 8px; min-height: 16px; }
#searchStatus.error { color: #ED1C24; }
#searchStatus.success { color: #2e7d32; }
#searchStatus.loading { color: #888; }
.suggestions { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #e0e0e0; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); margin-top: 6px; max-height: 280px; overflow-y: auto; z-index: 1000; display: none; }
.suggestions.active { display: block; }
.suggestion-item { padding: 12px 16px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #f0f0f0; transition: background 0.15s; line-height: 1.4; }
.suggestion-item:last-child { border-bottom: none; }
.suggestion-item:hover, .suggestion-item.selected { background: #fff5f5; color: #ED1C24; }
.suggestion-main { font-weight: 600; }
.suggestion-sub { font-size: 12px; color: #999; margin-top: 2px; }
.suggestion-loading { padding: 14px 16px; font-size: 13px; color: #999; text-align: center; }
.container { max-width: 1200px; margin: 20px auto 30px; padding: 0 20px; display: grid; grid-template-columns: 1.4fr 1fr; gap: 25px; }
@media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
.card { background: white; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 20px; }
#map { width: 100%; height: 550px; border-radius: 10px; overflow: hidden; }
.section-title { font-size: 18px; font-weight: 700; color: #ED1C24; margin-bottom: 15px; border-left: 4px solid #ED1C24; padding-left: 10px; }
.weight-selector { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.weight-btn { padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px; background: #fafafa; cursor: pointer; font-size: 14px; font-weight: 600; color: #555; transition: all 0.2s; text-align: left; }
.weight-btn:hover { border-color: #ED1C24; background: #fff5f5; }
.weight-btn.active { background: #ED1C24; border-color: #ED1C24; color: white; }
#result { border-radius: 12px; padding: 20px; background: #fafafa; border: 2px dashed #ddd; min-height: 100px; transition: all 0.3s; }
#result.filled { border-style: solid; }
.zone-badge { display: inline-block; padding: 6px 14px; border-radius: 20px; color: white; font-weight: 700; font-size: 15px; margin-bottom: 12px; }
.address-line { font-size: 14px; color: #666; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #e5e5e5; }
.price-big { font-size: 32px; font-weight: 800; color: #ED1C24; margin: 10px 0; }
.vehicle-info { display: flex; align-items: center; gap: 10px; background: #fff5f5; padding: 10px 14px; border-radius: 10px; margin: 12px 0; font-size: 14px; }
.vehicle-info b { color: #ED1C24; }
.price-note { font-size: 13px; color: #888; }
table.tariff { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
table.tariff th { background: #f0f0f0; padding: 8px; text-align: left; color: #666; }
table.tariff td { padding: 8px; border-bottom: 1px solid #eee; }
table.tariff tr.highlight td { background: #fff0f0; font-weight: 700; color: #ED1C24; }
.legend { display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #555; }
.legend-dot { width: 14px; height: 14px; border-radius: 4px; }
footer { text-align: center; padding: 20px; color: #999; font-size: 12px; }
</style>

<header>
    <img src="logo.png" alt="Akfix logo">
    <div>
        <h1>Калькулятор стоимости доставки</h1>
        <p>Мастерское решение для расчёта доставки по зонам</p>
    </div>
</header>

<div class="search-panel">
    <div class="search-box">
        <div class="search-field">
            <label>Адрес доставки</label>
            <input type="text" id="addressInput" placeholder="Начните вводить адрес..." autocomplete="off">
            <div class="suggestions" id="suggestions"></div>
        </div>
        <div class="search-field" style="max-width: 220px;">
            <label>Вес груза, т</label>
            <input type="number" id="weightInput" placeholder="Например: 4.2" step="0.1" min="0">
        </div>
        <button id="searchBtn">Рассчитать</button>
        <div id="searchStatus"></div>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="section-title">Карта зон доставки</div>
        <div id="map"></div>
        <div class="legend">
            <div class="legend-item"><span class="legend-dot" style="background:#ED1C24"></span>Красная зона</div>
            <div class="legend-item"><span class="legend-dot" style="background:#E8A600"></span>Оранжевая зона</div>
            <div class="legend-item"><span class="legend-dot" style="background:#0e4779"></span>Синяя зона</div>
        </div>
    </div>

    <div>
        <div class="card" style="margin-bottom: 20px;">
            <div class="section-title">Или выберите вес вручную</div>
            <div class="weight-selector" id="weightSelector">
                <button class="weight-btn active" data-weight="3.5">До 3,5 т</button>
                <button class="weight-btn" data-weight="5">От 3,5 до 5 т</button>
                <button class="weight-btn" data-weight="10">От 5 до 10 т</button>

        </div>
        <div class="card">
            <div class="section-title">Результат расчёта</div>
            <div id="result">Начните вводить адрес — появятся подсказки, либо кликните на карту.</div>
        </div>
    </div>
</div>

<footer>© Akfix — Мастерское решение</footer>

function weightToCategory(weight){
    if (weight <= 3.5) return "3.5";
    if (weight <= 5) return "5";
    if (weight <= 10) return "10";
    return "10+";
}

function parseKmlCoords(str){
    return str.trim().split(/\s+/).map(function(pair){
        var parts = pair.split(',');
        var lon = parseFloat(parts[0]);
        var lat = parseFloat(parts[1]);
        return [lat, lon];
    });
}

function initMap(){
    map = L.map('map').setView([55.75, 37.6], 8);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 19
    }).addTo(map);

    var redCoords = parseKmlCoords(redRaw);
    var orangeCoords = parseKmlCoords(orangeRaw);
    var blueCoords = parseKmlCoords(blueRaw);

    bluePolygon = L.polygon(blueCoords, { color: tariffs.blue.color, weight: 3, fillOpacity: 0.25 }).addTo(map);
    orangePolygon = L.polygon(orangeCoords, { color: tariffs.orange.color, weight: 3, fillOpacity: 0.25 }).addTo(map);
    redPolygon = L.polygon(redCoords, { color: tariffs.red.color, weight: 3, fillOpacity: 0.4 }).addTo(map);

    zoneCoords = { red: redCoords, orange: orangeCoords, blue: blueCoords };

    map.on('click', function (e) {
        var lat = e.latlng.lat;
        var lng = e.latlng.lng;

        setMarker(lat, lng);
        checkZoneByCoords(lat, lng);

        reverseGeocode(lat, lng).then(function(address){
            currentAddress = address;
            document.getElementById('addressInput').value = address;
            renderResult();
        });
    });
}

    var inside = false;
    for (var i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
        var xi = polygon[i][0], yi = polygon[i][1];
        var xj = polygon[j][0], yj = polygon[j][1];
        var intersect = ((yi > lng) !== (yj > lng)) &&
            (lat < (xj - xi) * (lng - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
    }
    return inside;
}

function checkZoneByCoords(lat, lng) {
    if (isPointInPolygon(lat, lng, zoneCoords.red)) {
        currentZoneKey = 'red';
    } else if (isPointInPolygon(lat, lng, zoneCoords.orange)) {
        currentZoneKey = 'orange';
    } else if (isPointInPolygon(lat, lng, zoneCoords.blue)) {
        currentZoneKey = 'blue';
    } else {
        currentZoneKey = null;
    }
}

function setMarker(lat, lng) {
    if (marker) map.removeLayer(marker);
    marker = L.marker([lat, lng]).addTo(map);
}

function reverseGeocode(lat, lng) {
    var url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat=' + lat + '&lon=' + lng;
    return fetch(url, { headers: { 'Accept-Language': 'ru' } })
        .then(function(res){ return res.json(); })
        .then(function(data){
            return data && data.display_name ? data.display_name : (lat.toFixed(5) + ', ' + lng.toFixed(5));
        })
        .catch(function(){
            return lat.toFixed(5) + ', ' + lng.toFixed(5);
        });
}

var DGIS_KEY = "50b13788-9afd-401a-a1d1-19f30773dcaa";
var MOSCOW_VIEWPOINT1 = "36.5,54.2";
var MOSCOW_VIEWPOINT2 = "40.2,56.9";

var addressInput = document.getElementById('addressInput');
var suggestionsBox = document.getElementById('suggestions');

addressInput.addEventListener('input', function(){
    var query = this.value.trim();
    clearTimeout(suggestTimer);

    if (query.length < 3) {
        suggestionsBox.classList.remove('active');
        suggestionsBox.innerHTML = '';
        return;
    }

    suggestionsBox.classList.add('active');
    suggestionsBox.innerHTML = '<div class="suggestion-loading">Ищем адреса...</div>';

    suggestTimer = setTimeout(function(){
        fetchSuggestions(query);
    }, 350);
});

function fetchSuggestions(query){
    var url = "https://catalog.api.2gis.com/3.0/suggests" +
        "?q=" + encodeURIComponent(query) +
        "&key=" + DGIS_KEY +
        "&viewpoint1=" + MOSCOW_VIEWPOINT1 +
        "&viewpoint2=" + MOSCOW_VIEWPOINT2 +
        "&fields=items.point,items.address_name,items.full_name" +
        "&page_size=7";

    fetch(url)
        .then(function(res){ return res.json(); })
        .then(function(data){
            var items = (data.result && data.result.items) ? data.result.items : [];
            suggestItems = items.map(function(item){
                return {
                    title: item.name || item.full_name || "",
                    subtitle: item.address_name || "",
                    point: item.point || null,
                    fullName: item.full_name || item.name || ""
                };
            });
            suggestIndex = -1;
            renderSuggestions();
        })
        .catch(function(err){
            console.error('Ошибка Suggest API:', err);
            suggestionsBox.innerHTML = '<div class="suggestion-loading">Ошибка загрузки подсказок</div>';
        });
}

function renderSuggestions(){
    if (!suggestItems.length) {
        suggestionsBox.innerHTML = '<div class="suggestion-loading">Ничего не найдено</div>';
        return;
    }

    suggestionsBox.innerHTML = suggestItems.map(function(item, i){
        return '<div class="suggestion-item" data-index="' + i + '">' +
                    '<div class="suggestion-main">' + item.title + '</div>' +
                    (item.subtitle ? '<div class="suggestion-sub">' + item.subtitle + '</div>' : '') +
                '</div>';
    }).join('');

    var items = suggestionsBox.querySelectorAll('.suggestion-item');
    items.forEach(function(el){
        el.addEventListener('click', function(){
            var idx = parseInt(this.getAttribute('data-index'), 10);
            selectSuggestion(idx);
        });
    });
}

function selectSuggestion(idx){
    var item = suggestItems[idx];
    if (!item) return;

    suggestionsBox.classList.remove('active');
    suggestionsBox.innerHTML = '';

    addressInput.value = item.fullName;
    currentAddress = item.fullName;

    var statusDiv = document.getElementById('searchStatus');

    if (item.point) {
        var lat = item.point.lat;
        var lng = item.point.lon;

        setMarker(lat, lng);
        map.setView([lat, lng], 13);
        checkZoneByCoords(lat, lng);
        renderResult();

        statusDiv.className = 'success';
        statusDiv.textContent = '✓ Адрес найден';
    } else {
        statusDiv.className = 'error';
        statusDiv.textContent = 'Не удалось получить координаты для этого варианта';
    }
}

addressInput.addEventListener('keydown', function(e){
    var items = suggestionsBox.querySelectorAll('.suggestion-item');
    if (!items.length) return;

    if (e.key === 'ArrowDown') {
        e.preventDefault();
        suggestIndex = Math.min(suggestIndex + 1, items.length - 1);
        updateSelectedSuggestion(items);
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        suggestIndex = Math.max(suggestIndex - 1, 0);
        updateSelectedSuggestion(items);
    } else if (e.key === 'Enter') {
        e.preventDefault();
        if (suggestIndex >= 0) {
            selectSuggestion(suggestIndex);
        } else {
            searchByAddress();
        }
    } else if (e.key === 'Escape') {
        suggestionsBox.classList.remove('active');
    }
});

function updateSelectedSuggestion(items){
    items.forEach(function(el, i){
        el.classList.toggle('selected', i === suggestIndex);
    });
    if (suggestIndex >= 0) {
        items[suggestIndex].scrollIntoView({ block: 'nearest' });
    }
}

document.addEventListener('click', function(e){
    if (!e.target.closest('.search-field')) {
        suggestionsBox.classList.remove('active');
    }
});

function forwardGeocode(address) {
    var url = "https://catalog.api.2gis.com/3.0/items/geocode" +
        "?q=" + encodeURIComponent(address) +
        "&key=" + DGIS_KEY +
        "&viewpoint1=" + MOSCOW_VIEWPOINT1 +
        "&viewpoint2=" + MOSCOW_VIEWPOINT2 +
        "&fields=items.point,items.full_name";

    return fetch(url)
        .then(function(res){ return res.json(); })
        .then(function(data){
            var items = (data.result && data.result.items) ? data.result.items : [];
            if (!items.length || !items[0].point) return null;

            return {
                lat: items[0].point.lat,
                lng: items[0].point.lon,
                displayName: items[0].full_name
            };
        });
}

function searchByAddress(){
    var statusDiv = document.getElementById('searchStatus');
    var address = document.getElementById('addressInput').value.trim();
    var weightVal = document.getElementById('weightInput').value.trim();

    statusDiv.className = '';
    statusDiv.textContent = '';
    suggestionsBox.classList.remove('active');

    if (!address) {
        statusDiv.classList.add('error');
        statusDiv.textContent = 'Введите адрес доставки';
        return;
    }

    if (weightVal) {
        var w = parseFloat(weightVal.replace(',', '.'));
        if (!isNaN(w)) {
            currentWeight = weightToCategory(w);
            updateWeightButtons(currentWeight);
        }
    }

    statusDiv.classList.add('loading');
    statusDiv.textContent = 'Ищем адрес...';
    document.getElementById('searchBtn').disabled = true;

    forwardGeocode(address).then(function(result){
        document.getElementById('searchBtn').disabled = false;
        statusDiv.classList.remove('loading');

        if (!result) {
            statusDiv.classList.add('error');
            statusDiv.textContent = 'Адрес не найден. Проверьте правильность ввода.';
            return;
        }

        currentAddress = result.displayName;
        setMarker(result.lat, result.lng);
        map.setView([result.lat, result.lng], 11);
        checkZoneByCoords(result.lat, result.lng);

        statusDiv.classList.add('success');
        statusDiv.textContent = '✓ Найдено: ' + currentAddress;

        renderResult();
    }).catch(function(err){
        console.error('Ошибка Geocoder API:', err);
        document.getElementById('searchBtn').disabled = false;
        statusDiv.classList.remove('loading');
        statusDiv.classList.add('error');
        statusDiv.textContent = 'Ошибка поиска адреса. Попробуйте ещё раз.';
    });
}

function updateWeightButtons(weightKey){
    document.querySelectorAll('.weight-btn').forEach(function(btn){
        btn.classList.toggle('active', btn.getAttribute('data-weight') === weightKey);
    });
}

document.getElementById('searchBtn').addEventListener('click', searchByAddress);

document.querySelectorAll('.weight-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
        currentWeight = this.getAttribute('data-weight');
        updateWeightButtons(currentWeight);
        document.getElementById('weightInput').value = '';
        renderResult();
    });
});

function renderResult(){
    var resultDiv = document.getElementById('result');

    if (!currentZoneKey) {
        resultDiv.classList.remove('filled');
        resultDiv.innerHTML = '<div style="color:#999;">Адрес находится вне зон доставки. Свяжитесь с менеджером для уточнения стоимости.</div>' +
            (currentAddress ? '<div class="address-line" style="margin-top:10px;">📍 ' + currentAddress + '</div>' : '');
        return;
    }

    var zone = tariffs[currentZoneKey];
    var price = zone.prices[currentWeight];
    var priceDisplay = typeof price === 'number' ? price.toLocaleString('ru-RU') + ' ₽' : price;

    var html = '';
    html += '<span class="zone-badge" style="background:' + zone.color + '">' + zone.name + '</span>';

    if (currentAddress) {
        html += '<div class="address-line">📍 ' + currentAddress + '</div>';
    }

    html += '<div class="vehicle-info">🚚 <b>' + vehicleLabels[currentWeight] + '</b></div>';
    html += '<div class="price-big">' + priceDisplay + '</div>';
    html += '<div class="price-note">Вес груза: ' + weightLabels[currentWeight] + '</div>';

    html += '<table class="tariff"><tr><th>Категория веса</th><th>Стоимость</th></tr>';
    ['3.5', '5', '10', '10+'].forEach(function(key){
        var p = zone.prices[key];
        var pDisplay = typeof p === 'number' ? p.toLocaleString('ru-RU') + ' ₽' : p;
        var rowClass = key === currentWeight ? ' class="highlight"' : '';
        html += '<tr' + rowClass + '><td>' + weightLabels[key] + '</td><td>' + pDisplay + '</td></tr>';
    });
    html += '</table>';

    resultDiv.classList.add('filled');
    resultDiv.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', function(){
    initMap();
});
</script>
